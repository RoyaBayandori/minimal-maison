# Minimal Maison — WordPress development stack (nginx + PHP-FPM)
# Local dev: docker compose up -d
# Production: see docker-compose.prod.yml and docs/PRODUCTION.md

name: minimal-maison

services:
  # Public edge: static files + FastCGI to wordpress (PHP never exposed directly)
  nginx:
    image: nginx:1.27-alpine
    container_name: mm-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - wordpress_data:/var/www/html:ro
      - ./wordpress/wp-content:/var/www/html/wp-content:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      wordpress:
        condition: service_started
    networks:
      - mm-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # WordPress core + PHP 8.3 FPM (custom image: WooCommerce-ready — see docker/php/Dockerfile)
  wordpress:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: minimal-maison/wordpress:php8.3-fpm
    container_name: mm-wordpress
    restart: unless-stopped
    volumes:
      - wordpress_data:/var/www/html
      - ./wordpress/wp-content:/var/www/html/wp-content
      - ./logs/php-fpm:/var/log/php
    environment: &wordpress-env
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WORDPRESS_DEBUG: ${WP_DEBUG:-false}
      WORDPRESS_DEBUG_LOG: ${WP_DEBUG_LOG:-false}
      WORDPRESS_DEBUG_DISPLAY: ${WP_DEBUG_DISPLAY:-false}
      WORDPRESS_CONFIG_EXTRA: |
        if ( file_exists( '/usr/local/etc/wordpress/wp-config-extra.php' ) ) {
          require_once '/usr/local/etc/wordpress/wp-config-extra.php';
        }
      WORDPRESS_LOCALE: ${WORDPRESS_LOCALE:-fa_IR}
      WP_ENVIRONMENT_TYPE: ${WP_ENVIRONMENT_TYPE:-local}
      WP_MEMORY_LIMIT: ${WP_MEMORY_LIMIT:-256M}
      WP_MAX_MEMORY_LIMIT: ${WP_MAX_MEMORY_LIMIT:-512M}
      WP_HOME: ${WP_HOME:-}
      WP_SITEURL: ${WP_SITEURL:-}
      DISALLOW_FILE_EDIT: ${DISALLOW_FILE_EDIT:-true}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mm-network

  # MySQL: internal network only — no host port (phpMyAdmin/wp-cli reach via service name)
  mysql:
    image: mysql:8.4
    container_name: mm-mysql
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
      - ./backups/mysql:/backups
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - mm-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # DB admin UI — connects to mysql:3306 on mm-network (no public MySQL port required)
  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: mm-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
      UPLOAD_LIMIT: 128M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mm-network

  # Local SMTP capture — omit in production (see docker-compose.prod.yml)
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mm-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - mm-network

  # On-demand WP-CLI (WooCommerce, language packs, etc.)
  wpcli:
    image: wordpress:cli-php8.3
    container_name: mm-wpcli
    user: "33:33"
    volumes:
      - wordpress_data:/var/www/html
      - ./wordpress/wp-content:/var/www/html/wp-content
    environment: *wordpress-env
    depends_on:
      mysql:
        condition: service_healthy
      wordpress:
        condition: service_started
    networks:
      - mm-network
    entrypoint: ["wp", "--allow-root"]
    command: ["--info"]

volumes:
  wordpress_data:
    name: mm_wordpress_data
  mysql_data:
    name: mm_mysql_data

networks:
  mm-network:
    name: mm_network
    driver: bridge
