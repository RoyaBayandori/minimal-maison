# Minimal Maison — WordPress site (nginx + PHP-FPM)

upstream php-fpm {
    server wordpress:9000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /var/www/html;
    index index.php index.html;

    # Directory listing disabled (also server_tokens off in nginx.conf)
    autoindex off;
    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    limit_req zone=general_limit burst=50 nodelay;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # XML-RPC: disabled (brute-force/amplification vector). App layer: mu-plugins/minimal-maison-security.php
    location = /xmlrpc.php {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block dotfiles (.env, .git, etc.) except ACME .well-known
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block repo/deploy artifacts if ever present under web root
    location ~* ^/(?:\.env|\.git|composer\.(?:json|lock)|package(?:-lock)?\.json|docker-compose(?:\..*)?\.ya?ml|Dockerfile)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # WordPress sensitive files (wp-config is outside web root in proper installs; belt-and-suspenders)
    location ~* /(?:wp-config\.php|wp-config-sample\.php|readme\.html|license\.txt)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /wp-content/(?:debug\.log|object-cache\.php)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Prevent PHP execution in uploads only (malicious uploaded shells)
    location ~* ^/wp-content/uploads/.*\.php$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|avif|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Whitelist: only these PHP entry points may execute
    location ~ ^/wp-admin/.+\.php$ {
        limit_req zone=login_limit burst=5 nodelay;
        include /etc/nginx/snippets/fastcgi-wordpress.conf;
    }

    location = /wp-login.php {
        limit_req zone=login_limit burst=3 nodelay;
        include /etc/nginx/snippets/fastcgi-wordpress.conf;
    }

    location ~ ^/(?:index|wp-cron|wp-comments-post|wp-links-opml|wp-mail|wp-trackback|wp-activate|wp-signup)\.php$ {
        include /etc/nginx/snippets/fastcgi-wordpress.conf;
    }

    # Deny any other .php file
    location ~ \.php$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
        allow all;
    }
}
