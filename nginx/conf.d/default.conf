# Minimal Maison — local development vhost (nginx + PHP-FPM)
# Permissive PHP routing for WooCommerce / payment plugins; tighten in nginx/conf.d/production/ later.

upstream php-fpm {
    server wordpress:9000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /var/www/html;
    index index.php index.html;

    autoindex off;
    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    limit_req zone=general_limit burst=50 nodelay;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location = /xmlrpc.php {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(?:\.env|\.git|composer\.(?:json|lock)|package(?:-lock)?\.json|docker-compose(?:\..*)?\.ya?ml|Dockerfile)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /(?:wp-config\.php|wp-config-sample\.php|readme\.html|license\.txt)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /wp-content/debug\.log$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* ^/wp-content/uploads/.*\.php$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # No long-lived cache in dev (Vite/Tailwind asset iteration)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|avif|woff2?|ttf|eot)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location = /wp-login.php {
        limit_req zone=login_limit burst=3 nodelay;
        include /etc/nginx/snippets/fastcgi-wordpress.conf;
    }

    location ~ \.php$ {
        include /etc/nginx/snippets/fastcgi-wordpress.conf;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
        allow all;
    }
}
